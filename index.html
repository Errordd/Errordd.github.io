<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Errord's Website :D</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #288183;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @font-face {
            font-family: 'W95FA';
            src: url('W95F.otf') format('opentype');
            font-display: swap;
        }

        .clock-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 366px;
            height: 133px;
            background-image: url('background.jpg');
            background-size: 366px 133px;
            background-repeat: no-repeat;
            color: #000;
            font-family: 'W95FA', 'Courier New', monospace;
            user-select: none;
            cursor: grab;
            z-index: 10;
        }

        .clock-widget.dragging {
            cursor: grabbing;
        }

        .clock-time {
            position: absolute;
            top: 44px;
            left: 20px;
            display: flex;
            align-items: baseline;
            font-size: 36px;
            line-height: 1;
            letter-spacing: 0px;
        }

        .clock-time .digit,
        .clock-time .colon {
            display: inline-block;
            text-align: center;
        }

        .clock-time .digit {
            width: 20px;
        }

        .clock-time .colon {
            width: 14px;
        }

        .clock-date {
            position: absolute;
            top: 92px;
            left: 20px;
            font-family: 'W95FA', 'Courier New', monospace;
            font-size: 12px;
            color: #000;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="song.mp3" loop autoplay></audio>

    <div class="clock-widget" id="clockWidget">
        <div class="clock-time" id="clockTime">
            <span class="digit" id="h1">0</span><span class="digit" id="h2">0</span><span class="colon">:</span><span class="digit" id="m1">0</span><span class="digit" id="m2">0</span><span class="colon">:</span><span class="digit" id="s1">0</span><span class="digit" id="s2">0</span>
        </div>
        <div class="clock-date" id="clockDate">Loading...</div>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        audio.play().catch(() => {
            const startAudio = () => {
                audio.play();
                document.removeEventListener('click', startAudio);
                document.removeEventListener('keydown', startAudio);
            };
            document.addEventListener('click', startAudio);
            document.addEventListener('keydown', startAudio);
        });
        
        let use12Hour = true;

        const h1 = document.getElementById('h1');
        const h2 = document.getElementById('h2');
        const m1 = document.getElementById('m1');
        const m2 = document.getElementById('m2');
        const s1 = document.getElementById('s1');
        const s2 = document.getElementById('s2');
        const dateEl = document.getElementById('clockDate');

        const weekdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

        function pad(n) {
            return n.toString().padStart(2, '0');
        }

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            let displayHours = hours;
            if (use12Hour) {
                displayHours = hours % 12;
                if (displayHours === 0) displayHours = 12;
            }

            const hStr = pad(displayHours);
            const mStr = pad(minutes);
            const sStr = pad(seconds);

            h1.textContent = hStr[0];
            h2.textContent = hStr[1];
            m1.textContent = mStr[0];
            m2.textContent = mStr[1];
            s1.textContent = sStr[0];
            s2.textContent = sStr[1];

            dateEl.textContent = `${weekdays[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
        }

        updateClock();
        setInterval(updateClock, 1000);

        document.getElementById('clockWidget').addEventListener('contextmenu', (e) => {
            e.preventDefault();
            use12Hour = !use12Hour;
            updateClock();
        });

        const widget = document.getElementById('clockWidget');
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        function startDrag(clientX, clientY) {
            const rect = widget.getBoundingClientRect();
            isDragging = true;
            dragOffsetX = clientX - rect.left;
            dragOffsetY = clientY - rect.top;

            widget.style.left = rect.left + 'px';
            widget.style.top = rect.top + 'px';
            widget.style.right = 'auto';

            widget.classList.add('dragging');
        }

        function moveDrag(clientX, clientY) {
            if (!isDragging) return;
            let newLeft = clientX - dragOffsetX;
            let newTop = clientY - dragOffsetY;

            newLeft = Math.max(0, Math.min(window.innerWidth - widget.offsetWidth, newLeft));
            newTop = Math.max(0, Math.min(window.innerHeight - widget.offsetHeight, newTop));

            widget.style.left = newLeft + 'px';
            widget.style.top = newTop + 'px';
        }

        function endDrag() {
            isDragging = false;
            widget.classList.remove('dragging');
        }

        widget.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            startDrag(e.clientX, e.clientY);
        });

        document.addEventListener('mousemove', (e) => {
            moveDrag(e.clientX, e.clientY);
        });

        document.addEventListener('mouseup', endDrag);

        widget.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            startDrag(touch.clientX, touch.clientY);
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            moveDrag(touch.clientX, touch.clientY);
        }, { passive: true });

        document.addEventListener('touchend', endDrag);
    </script>
</body>
</html>
